<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(
    activePage='dashboard',
    pageTitle='Tổng quan',
    content=~{::section},
    extraStyles=~{::style},
    extraScripts=~{::script}
)}">
<head>
    <style>
        .stat-card { transition: transform 0.2s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <section>
        <div class="row g-4 mb-4">
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 bg-primary-subtle text-primary p-3 rounded-3">
                                <i class="bi bi-calendar-range fs-3"></i>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">Năm học</h6>
                                <h3 class="mb-0 fw-bold" id="stat-school-years">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 bg-success-subtle text-success p-3 rounded-3">
                                <i class="bi bi-calendar3 fs-3"></i>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">Học kỳ</h6>
                                <h3 class="mb-0 fw-bold" id="stat-semesters">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 bg-info-subtle text-info p-3 rounded-3">
                                <i class="bi bi-book fs-3"></i>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">Lớp học phần</h6>
                                <h3 class="mb-0 fw-bold" id="stat-course-sections">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-xl-3">
                <div class="card stat-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 bg-warning-subtle text-warning p-3 rounded-3">
                                <i class="bi bi-person-badge fs-3"></i>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="text-muted mb-1">Giảng viên</h6>
                                <h3 class="mb-0 fw-bold" id="stat-lecturers">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center py-3 bg-white">
                        <h5 class="card-title mb-0 fw-bold">Thống kê sĩ số lớp học phần</h5>
                        <button class="btn btn-sm btn-light border" onclick="loadDashboardData()"><i class="bi bi-arrow-clockwise me-1"></i> Làm mới</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Mã lớp</th>
                                        <th>Tên môn</th>
                                        <th>SV đăng ký</th>
                                        <th>Chỉ tiêu</th>
                                        <th>Còn trống</th>
                                        <th class="pe-4">Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="statistics-tbody">
                                    <tr>
                                        <td colspan="6" class="text-center py-5">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        async function loadDashboardData() {
            try {
                const overview = await apiRequest('/api/dashboard/overview');
                document.getElementById('stat-school-years').textContent = overview.tongNamHoc || 0;
                document.getElementById('stat-semesters').textContent = overview.tongHocKy || 0;
                document.getElementById('stat-course-sections').textContent = overview.tongLopHocPhan || 0;
                document.getElementById('stat-lecturers').textContent = overview.tongPhanCongGiangDay || 0;

                const stats = await apiRequest('/api/dashboard/course-sections-statistics');
                const tbody = document.getElementById('statistics-tbody');
                
                if (!stats || stats.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">Không có dữ liệu</td></tr>';
                    return;
                }

                tbody.innerHTML = stats.map(item => `
                    <tr>
                        <td class="ps-4 fw-medium text-primary">${item.maLop || ''}</td>
                        <td>${item.tenMon || ''}</td>
                        <td><span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3">${item.soSVDangKy || 0}</span></td>
                        <td>${item.chiTieu || 0}</td>
                        <td class="${item.conTrong > 0 ? 'text-success' : 'text-danger'} fw-bold">${item.conTrong || 0}</td>
                        <td class="pe-4">
                            <span class="status-badge ${item.conTrong > 0 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'} px-3 py-1">
                                ${item.conTrong > 0 ? 'Còn chỗ' : 'Đã đầy'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi khi tải dữ liệu tổng quan' });
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
