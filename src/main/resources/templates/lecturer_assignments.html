<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(
    activePage='lecturer-assignments',
    pageTitle='Phân công Giảng viên',
    content=~{::section},
    extraStyles=~{::style},
    extraScripts=~{::script}
)}">
<head>
    <style></style>
</head>
<body>
    <section>
        <div class="card border-0">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="bi bi-person-badge-fill me-2 text-primary"></i>Danh sách Phân công Giảng dạy</h5>
                <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i> Phân công Mới</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Giảng viên / ID</th>
                                <th>Lớp học phần</th>
                                <th>Tên môn học</th>
                                <th>Vai trò phân công</th>
                                <th class="pe-4 text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="data-tbody">
                            <tr>
                                <td colspan="5" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- CRUD Modal -->
        <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
            <div class="modal-dialog modal-dialog-centered animate__animated animate__fadeInUp">
                <div class="modal-content border-0 shadow-lg rounded-4">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold" id="modalTitle">Thiết lập Phân công</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="crudForm">
                        <div class="modal-body p-4">
                            <input type="hidden" id="entityId">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">ID Giảng viên / Nhân viên</label>
                                <input type="text" class="form-control rounded-3" id="employeeId" required placeholder="Nhập UUID giảng viên">
                                <div class="form-text small">Tạm thời nhập UUID từ hệ thống nhân sự.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Lớp học phần được phân công</label>
                                <select class="form-select rounded-3" id="courseClassId" required>
                                    <option value="">-- Chọn lớp học --</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Vai trò trong lớp</label>
                                <select class="form-select rounded-3" id="role">
                                    <option value="Giảng viên chính">Giảng viên chính</option>
                                    <option value="Trợ giảng">Trợ giảng</option>
                                    <option value="Cố vấn">Cố vấn học tập</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer border-0 pt-0 px-4 pb-4">
                            <button type="button" class="btn btn-light px-4 rounded-3" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary px-4 rounded-3 shadow">Lưu phân công</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        const API_URL = '/api/lecturer-course-classes';
        const DASHBOARD_API = '/api/dashboard/lecturer-assignments';
        const COURSE_API = '/api/course-sections';
        let modal;

        async function loadCourseSections() {
            try {
                const data = await apiRequest(COURSE_API);
                const select = document.getElementById('courseClassId');
                select.innerHTML = '<option value="">-- Chọn lớp học --</option>' + 
                    data.map(c => `<option value="${c.id}">${c.code} - ${c.name}</option>`).join('');
            } catch (error) { console.error('Error loading courses:', error); }
        }

        async function loadData() {
            try {
                const data = await apiRequest(DASHBOARD_API);
                const tbody = document.getElementById('data-tbody');
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">Chưa có giảng viên nào được phân công</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td class="ps-4">
                            <div class="fw-bold text-dark">${item.maGV || 'N/A'}</div>
                        </td>
                        <td><span class="badge bg-light text-dark border">${item.maLop || 'N/A'}</span></td>
                        <td class="fw-medium">${item.tenMon || ''}</td>
                        <td><span class="status-badge bg-info-subtle text-info">${item.vaiTro || ''}</span></td>
                        <td class="pe-4 text-center">
                            <div class="btn-group shadow-sm rounded-3 overflow-hidden">
                                <button class="btn btn-sm btn-white border-end" onclick="openModal('${item.id}')" title="Sửa"><i class="bi bi-pencil text-primary"></i></button>
                                <button class="btn btn-sm btn-white text-danger" onclick="deleteItem('${item.id}')" title="Xóa"><i class="bi bi-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi tải danh sách phân công' });
            }
        }

        async function openModal(id = null) {
            document.getElementById('crudForm').reset();
            document.getElementById('entityId').value = id || '';
            document.getElementById('modalTitle').textContent = id ? 'Cập nhật phân công' : 'Phân công Giảng dạy';
            
            await loadCourseSections();

            if (id) {
                try {
                    const item = await apiRequest(`${API_URL}/${id}`);
                    document.getElementById('employeeId').value = item.employeeId || '';
                    document.getElementById('courseClassId').value = item.courseClassId || '';
                    document.getElementById('role').value = item.role || 'Giảng viên chính';
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Lỗi tải thông tin phân công' });
                    return;
                }
            }
            modal.show();
        }

        document.getElementById('crudForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('entityId').value;
            const data = {
                employeeId: document.getElementById('employeeId').value,
                courseClassId: document.getElementById('courseClassId').value,
                role: document.getElementById('role').value
            };

            try {
                if (id) {
                    await apiRequest(`${API_URL}/${id}`, 'PUT', data);
                    toast.fire({ icon: 'success', title: 'Đã cập nhật' });
                } else {
                    await apiRequest(API_URL, 'POST', data);
                    toast.fire({ icon: 'success', title: 'Đã phân công thành công' });
                }
                modal.hide();
                loadData();
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi không thể lưu' });
            }
        };

        async function deleteItem(id) {
            const result = await Swal.fire({
                title: 'Hủy phân công này?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Bỏ qua'
            });

            if (result.isConfirmed) {
                try {
                    await apiRequest(`${API_URL}/${id}`, 'DELETE');
                    toast.fire({ icon: 'success', title: 'Đã hủy phân công' });
                    loadData();
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Lỗi khi xóa dữ liệu' });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('crudModal'));
            loadData();
        });
    </script>
</body>
</html>
