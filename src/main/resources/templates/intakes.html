<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(
    activePage='intakes',
    pageTitle='Quản lý Niên khóa',
    content=~{::section},
    extraStyles=~{::style},
    extraScripts=~{::script}
)}">
<head>
    <style>
        .intake-card {
            border-left: 4px solid #6366f1;
        }
    </style>
</head>
<body>
    <section>
        <div class="card border-0">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="bi bi-collection me-2 text-primary"></i>Danh sách Niên khóa</h5>
                <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i> Thiết lập Niên khóa mới</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Mã Khóa</th>
                                <th>Tên Niên khóa</th>
                                <th>Năm bắt đầu</th>
                                <th>Năm kết thúc</th>
                                <th>Trạng thái</th>
                                <th class="pe-4 text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="data-tbody">
                            <tr>
                                <td colspan="6" class="text-center py-5">
                                    <div class="spinner-grow text-primary" role="status"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- CRUD Modal -->
        <div class="modal fade animate__animated animate__fadeInDown" id="crudModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg rounded-4">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold" id="modalTitle">Thêm Niên khóa</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="crudForm">
                        <div class="modal-body p-4">
                            <input type="hidden" id="entityId">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Mã niên khóa</label>
                                <input type="text" class="form-control rounded-3" id="code" required placeholder="VD: K60">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Tên niên khóa</label>
                                <input type="text" class="form-control rounded-3" id="name" required placeholder="VD: Khóa 60 (2020-2024)">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-muted">Năm bắt đầu</label>
                                    <input type="number" class="form-control rounded-3" id="startYear" required placeholder="2020">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold text-muted">Năm kết thúc</label>
                                    <input type="number" class="form-control rounded-3" id="endYear" required placeholder="2024">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted">Mô tả (Ghi chú)</label>
                                <textarea class="form-control rounded-3" id="description" rows="2"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-0 pt-0 px-4 pb-4">
                            <button type="button" class="btn btn-light px-4 rounded-3" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary px-4 rounded-3 shadow">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        const API_URL = '/api/intakes';
        let modal;

        async function loadData() {
            try {
                const data = await apiRequest(API_URL);
                const tbody = document.getElementById('data-tbody');
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5"><div class="text-muted"><i class="bi bi-inbox fs-1 d-block mb-2"></i>Chưa có niên khóa nào</div></td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td class="ps-4"><span class="fw-bold text-indigo">${item.code || ''}</span></td>
                        <td class="fw-medium">${item.name || ''}</td>
                        <td><span class="badge bg-light text-dark border">${item.startYear || ''}</span></td>
                        <td><span class="badge bg-light text-dark border">${item.endYear || ''}</span></td>
                        <td><span class="status-badge ${item.isActive ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary'}">${item.isActive ? 'ĐANG TUYỂN' : 'KẾT THÚC'}</span></td>
                        <td class="pe-4 text-center">
                            <div class="btn-group shadow-sm rounded-3 overflow-hidden">
                                <button class="btn btn-sm btn-white border-end" onclick="openModal('${item.id}')"><i class="bi bi-pencil text-primary"></i></button>
                                <button class="btn btn-sm btn-white text-danger" onclick="deleteItem('${item.id}')"><i class="bi bi-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi tải danh sách niên khóa' });
            }
        }

        async function openModal(id = null) {
            document.getElementById('crudForm').reset();
            document.getElementById('entityId').value = id || '';
            document.getElementById('modalTitle').textContent = id ? 'Cập nhật Niên khóa' : 'Thiết lập Niên khóa mới';
            
            if (id) {
                try {
                    const item = await apiRequest(`${API_URL}/${id}`);
                    document.getElementById('code').value = item.code || '';
                    document.getElementById('name').value = item.name || '';
                    document.getElementById('startYear').value = item.startYear || '';
                    document.getElementById('endYear').value = item.endYear || '';
                    document.getElementById('description').value = item.description || '';
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Lỗi tải thông tin' });
                    return;
                }
            }
            modal.show();
        }

        document.getElementById('crudForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('entityId').value;
            const data = {
                code: document.getElementById('code').value,
                name: document.getElementById('name').value,
                startYear: parseInt(document.getElementById('startYear').value),
                endYear: parseInt(document.getElementById('endYear').value),
                description: document.getElementById('description').value
            };

            try {
                if (id) {
                    await apiRequest(`${API_URL}/${id}`, 'PUT', data);
                    toast.fire({ icon: 'success', title: 'Đã cập nhật niên khóa' });
                } else {
                    await apiRequest(API_URL, 'POST', data);
                    toast.fire({ icon: 'success', title: 'Đã thêm niên khóa mới' });
                }
                modal.hide();
                loadData();
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi khi đồng bộ dữ liệu' });
            }
        };

        async function deleteItem(id) {
            const result = await Swal.fire({
                title: 'Xóa niên khóa này?',
                text: "Toàn bộ dữ liệu liên quan sẽ bị ảnh hưởng!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Đồng ý xóa',
                cancelButtonText: 'Hủy bỏ'
            });

            if (result.isConfirmed) {
                try {
                    await apiRequest(`${API_URL}/${id}`, 'DELETE');
                    toast.fire({ icon: 'success', title: 'Đã xóa thành công' });
                    loadData();
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Không thể xóa dữ liệu này' });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('crudModal'));
            loadData();
        });
    </script>
</body>
</html>
