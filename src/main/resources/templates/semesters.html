<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(
    activePage='semesters',
    pageTitle='Quản lý Học kỳ',
    content=~{::section},
    extraStyles=~{::style},
    extraScripts=~{::script}
)}">
<head>
    <style></style>
</head>
<body>
    <section>
        <div class="card border-0 shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center py-3 bg-white">
                <h5 class="card-title mb-0 fw-bold"><i class="bi bi-calendar3 me-2 text-primary"></i>Danh sách Học kỳ</h5>
                <button class="btn btn-primary px-4 shadow-sm" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i> Thêm mới</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Mã</th>
                                <th>Tên học kỳ</th>
                                <th>Năm học</th>
                                <th>Bắt đầu</th>
                                <th>Kết thúc</th>
                                <th>Trạng thái</th>
                                <th class="pe-4 text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="data-tbody">
                            <tr>
                                <td colspan="7" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- CRUD Modal -->
        <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="modalTitle">Thêm Học kỳ</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="crudForm">
                        <div class="modal-body">
                            <input type="hidden" id="entityId">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Năm học</label>
                                <select class="form-select" id="schoolYearId" required>
                                    <option value="">-- Chọn năm học --</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mã học kỳ</label>
                                <input type="text" class="form-control" id="code" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên học kỳ</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Ngày bắt đầu</label>
                                    <input type="date" class="form-control" id="startDate" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Ngày kết thúc</label>
                                    <input type="date" class="form-control" id="endDate" required>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer bg-light px-4">
                            <button type="button" class="btn btn-light border px-4" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        const API_URL = '/api/semesters';
        const SCHOOL_YEAR_API = '/api/school-years';
        let modal;

        async function loadSchoolYears() {
            try {
                const schoolYears = await apiRequest(SCHOOL_YEAR_API);
                const select = document.getElementById('schoolYearId');
                select.innerHTML = '<option value="">-- Chọn năm học --</option>' + 
                    schoolYears.map(sy => `<option value="${sy.id}">${sy.name}</option>`).join('');
            } catch (error) {
                console.error('Error loading school years:', error);
            }
        }

        async function loadData() {
            try {
                const data = await apiRequest(API_URL);
                const tbody = document.getElementById('data-tbody');
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted">Không có dữ liệu</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td class="ps-4 fw-medium text-primary">${item.code || ''}</td>
                        <td>${item.name || ''}</td>
                        <td><span class="badge bg-light text-dark border">${item.schoolYearName || 'N/A'}</span></td>
                        <td>${item.startDate || ''}</td>
                        <td>${item.endDate || ''}</td>
                        <td><span class="status-badge ${item.isActive ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary'}">${item.isActive ? 'Hoạt động' : 'Tạm dừng'}</span></td>
                        <td class="pe-4 text-center">
                            <button class="btn btn-sm btn-info-subtle action-btn text-info me-1" onclick="openModal('${item.id}')" title="Chỉnh sửa"><i class="bi bi-pencil-square"></i></button>
                            <button class="btn btn-sm btn-danger-subtle action-btn text-danger" onclick="deleteItem('${item.id}')" title="Xóa"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi khi tải danh sách' });
            }
        }

        async function openModal(id = null) {
            document.getElementById('crudForm').reset();
            document.getElementById('entityId').value = id || '';
            document.getElementById('modalTitle').textContent = id ? 'Chỉnh sửa Học kỳ' : 'Thêm Học kỳ';
            
            await loadSchoolYears();

            if (id) {
                try {
                    const item = await apiRequest(`${API_URL}/${id}`);
                    document.getElementById('schoolYearId').value = item.schoolYearId || '';
                    document.getElementById('code').value = item.code || '';
                    document.getElementById('name').value = item.name || '';
                    document.getElementById('startDate').value = item.startDate || '';
                    document.getElementById('endDate').value = item.endDate || '';
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Lỗi khi tải thông tin' });
                    return;
                }
            }
            modal.show();
        }

        document.getElementById('crudForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('entityId').value;
            const select = document.getElementById('schoolYearId');
            const data = {
                schoolYearId: select.value,
                schoolYearName: select.options[select.selectedIndex].text,
                code: document.getElementById('code').value,
                name: document.getElementById('name').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value
            };

            try {
                if (id) {
                    await apiRequest(`${API_URL}/${id}`, 'PUT', data);
                    toast.fire({ icon: 'success', title: 'Cập nhật thành công' });
                } else {
                    await apiRequest(API_URL, 'POST', data);
                    toast.fire({ icon: 'success', title: 'Thêm mới thành công' });
                }
                modal.hide();
                loadData();
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi khi lưu dữ liệu' });
            }
        };

        async function deleteItem(id) {
            const result = await Swal.fire({
                title: 'Xác nhận xóa?',
                text: "Bạn không thể hoàn tác hành động này!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            });

            if (result.isConfirmed) {
                try {
                    await apiRequest(`${API_URL}/${id}`, 'DELETE');
                    toast.fire({ icon: 'success', title: 'Đã xóa thành công' });
                    loadData();
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Lỗi khi xóa dữ liệu' });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('crudModal'));
            loadData();
        });
    </script>
</body>
</html>
