<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(
    activePage='course-sections',
    pageTitle='Quản lý Lớp học phần',
    content=~{::section},
    extraStyles=~{::style},
    extraScripts=~{::script}
)}">
<head>
    <style></style>
</head>
<body>
    <section>
        <div class="card border-0">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold"><i class="bi bi-journal-bookmark-fill me-2 text-primary"></i>Danh sách Lớp học phần</h5>
                <button class="btn btn-primary" onclick="openModal()"><i class="bi bi-plus-lg me-1"></i> Mở Lớp học phần mới</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Mã lớp</th>
                                <th>Tiêu đề môn học</th>
                                <th>Sĩ số (Tối đa)</th>
                                <th>Đăng ký (Bắt đầu)</th>
                                <th>Đăng ký (Kết thúc)</th>
                                <th>Trạng thái</th>
                                <th class="pe-4 text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="data-tbody">
                            <tr>
                                <td colspan="7" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- CRUD Modal -->
        <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
            <div class="modal-dialog modal-lg modal-dialog-centered animate__animated animate__fadeInUp">
                <div class="modal-content border-0 shadow-lg rounded-4">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-bold" id="modalTitle">Thiết lập Lớp học phần</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="crudForm">
                        <div class="modal-body p-4">
                            <input type="hidden" id="entityId">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted">Học kỳ áp dụng</label>
                                    <select class="form-select rounded-3" id="semesterId" required>
                                        <option value="">-- Chọn học kỳ --</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted">Phân loại lớp</label>
                                    <select class="form-select rounded-3" id="classType">
                                        <option value="Lý thuyết">Lý thuyết</option>
                                        <option value="Thực hành">Thực hành</option>
                                        <option value="Đồ án">Đồ án</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-muted">Mã lớp</label>
                                    <input type="text" class="form-control rounded-3" id="code" required placeholder="VD: CS101.H1">
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label small fw-bold text-muted">Tên môn học / Tên lớp</label>
                                    <input type="text" class="form-control rounded-3" id="name" required placeholder="VD: Lập trình Java - Nhóm 1">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-muted">Sĩ số tối đa</label>
                                    <input type="number" class="form-control rounded-3" id="maxStudents" required value="40">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-muted">Sĩ số tối thiểu</label>
                                    <input type="number" class="form-control rounded-3" id="minStudents" required value="10">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold text-muted">Trạng thái vận hành</label>
                                    <select class="form-select rounded-3" id="status">
                                        <option value="OPEN">Mở đăng ký</option>
                                        <option value="CLOSED">Đóng đăng ký</option>
                                        <option value="IN_PROGRESS">Đang học</option>
                                        <option value="COMPLETED">Đã kết thúc</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted">Thời gian Bắt đầu đăng ký</label>
                                    <input type="datetime-local" class="form-control rounded-3" id="registrationStart" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-muted">Thời gian Kết thúc đăng ký</label>
                                    <input type="datetime-local" class="form-control rounded-3" id="registrationEnd" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold text-muted">Ghi chú bổ sung</label>
                                    <textarea class="form-control rounded-3" id="note" rows="2" placeholder="Thông tinh phụ..."></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer border-0 pt-0 px-4 pb-4">
                            <button type="button" class="btn btn-light px-4 rounded-3" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-primary px-4 rounded-3 shadow">Lưu lại</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        const API_URL = '/api/course-sections';
        const SEMESTER_API = '/api/semesters';
        let modal;

        async function loadSemesters() {
            try {
                const semesters = await apiRequest(SEMESTER_API);
                const select = document.getElementById('semesterId');
                select.innerHTML = '<option value="">-- Chọn học kỳ --</option>' + 
                    semesters.map(s => `<option value="${s.id}">${s.name} (${s.schoolYearName})</option>`).join('');
            } catch (error) {
                console.error('Error loading semesters:', error);
            }
        }

        async function loadData() {
            try {
                const data = await apiRequest(API_URL);
                const tbody = document.getElementById('data-tbody');
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted">Chưa có lớp học phần nào được thiết lập</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(item => {
                    let statusClass = 'bg-secondary-subtle text-secondary';
                    if (item.status === 'OPEN') statusClass = 'bg-success-subtle text-success';
                    if (item.status === 'IN_PROGRESS') statusClass = 'bg-primary-subtle text-primary';
                    if (item.status === 'CLOSED') statusClass = 'bg-warning-subtle text-warning';

                    return `
                        <tr>
                            <td class="ps-4 fw-bold text-primary">${item.code || ''}</td>
                            <td>
                                <div class="fw-medium">${item.name || ''}</div>
                                <div class="small text-muted">${item.classType || ''}</div>
                            </td>
                            <td><span class="badge bg-light text-dark border">${item.maxStudents || 0} SV</span></td>
                            <td><small class="text-muted"><i class="bi bi-calendar-check me-1"></i>${item.registrationStart ? item.registrationStart.replace('T', ' ') : ''}</small></td>
                            <td><small class="text-muted"><i class="bi bi-calendar-x me-1"></i>${item.registrationEnd ? item.registrationEnd.replace('T', ' ') : ''}</small></td>
                            <td><span class="status-badge ${statusClass}">${item.status || ''}</span></td>
                            <td class="pe-4 text-center">
                                <div class="btn-group shadow-sm rounded-3 overflow-hidden">
                                    <button class="btn btn-sm btn-white border-end" onclick="openModal('${item.id}')" title="Sửa"><i class="bi bi-pencil text-primary"></i></button>
                                    <button class="btn btn-sm btn-white text-danger" onclick="deleteItem('${item.id}')" title="Xóa"><i class="bi bi-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi tải danh sách lớp' });
            }
        }

        async function openModal(id = null) {
            document.getElementById('crudForm').reset();
            document.getElementById('entityId').value = id || '';
            document.getElementById('modalTitle').textContent = id ? 'Cập nhật Lớp học phần' : 'Thiết lập Lớp học phần mới';
            
            await loadSemesters();

            if (id) {
                try {
                    const item = await apiRequest(`${API_URL}/${id}`);
                    document.getElementById('semesterId').value = item.semesterId || '';
                    document.getElementById('code').value = item.code || '';
                    document.getElementById('name').value = item.name || '';
                    document.getElementById('maxStudents').value = item.maxStudents || 40;
                    document.getElementById('minStudents').value = item.minStudents || 10;
                    document.getElementById('classType').value = item.classType || 'Lý thuyết';
                    document.getElementById('status').value = item.status || 'OPEN';
                    document.getElementById('registrationStart').value = item.registrationStart ? item.registrationStart.substring(0, 16) : '';
                    document.getElementById('registrationEnd').value = item.registrationEnd ? item.registrationEnd.substring(0, 16) : '';
                    document.getElementById('note').value = item.note || '';
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Lỗi tải thông tin' });
                    return;
                }
            }
            modal.show();
        }

        document.getElementById('crudForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('entityId').value;
            const data = {
                semesterId: document.getElementById('semesterId').value,
                code: document.getElementById('code').value,
                name: document.getElementById('name').value,
                maxStudents: parseInt(document.getElementById('maxStudents').value),
                minStudents: parseInt(document.getElementById('minStudents').value),
                classType: document.getElementById('classType').value,
                status: document.getElementById('status').value,
                registrationStart: document.getElementById('registrationStart').value,
                registrationEnd: document.getElementById('registrationEnd').value,
                note: document.getElementById('note').value
            };

            try {
                if (id) {
                    await apiRequest(`${API_URL}/${id}`, 'PUT', data);
                    toast.fire({ icon: 'success', title: 'Đã cập nhật' });
                } else {
                    await apiRequest(API_URL, 'POST', data);
                    toast.fire({ icon: 'success', title: 'Đã thêm mới' });
                }
                modal.hide();
                loadData();
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi không thể lưu' });
            }
        };

        async function deleteItem(id) {
            const result = await Swal.fire({
                title: 'Xác nhận xóa lớp này?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Đồng ý',
                cancelButtonText: 'Hủy'
            });

            if (result.isConfirmed) {
                try {
                    await apiRequest(`${API_URL}/${id}`, 'DELETE');
                    toast.fire({ icon: 'success', title: 'Đã xóa thành công' });
                    loadData();
                } catch (error) {
                    toast.fire({ icon: 'error', title: 'Lỗi khi xóa dữ liệu' });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            modal = new bootstrap.Modal(document.getElementById('crudModal'));
            loadData();
        });
    </script>
</body>
</html>
