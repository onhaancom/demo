<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(
    activePage='dashboard',
    pageTitle='Tổng quan hệ thống',
    content=~{::section},
    extraStyles=~{::style},
    extraScripts=~{::script}
)}">
<head>
    <style>
        .stat-card {
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            z-index: 1;
        }
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }
        .stat-icon {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }
        .progress-slim { height: 6px; border-radius: 10px; }
        
        .premium-table thead th {
            background: rgba(241, 245, 249, 0.5) !important;
            border-top: 0 !important;
        }
    </style>
</head>
<body>
    <section>
        <!-- Stats Row -->
        <div class="row g-4 mb-5 animate__animated animate__fadeInUp">
            <div class="col-xl-2 col-md-4 col-sm-6">
                <div class="card stat-card h-100">
                    <div class="card-body p-4">
                        <div class="stat-icon bg-indigo-subtle text-indigo mb-3">
                            <i class="bi bi-collection-fill fs-4"></i>
                        </div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Niên khóa</h6>
                        <h3 class="fw-extrabold mb-0" id="stat-intakes">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-sm-6">
                <div class="card stat-card h-100">
                    <div class="card-body p-4">
                        <div class="stat-icon bg-primary-subtle text-primary mb-3">
                            <i class="bi bi-calendar-event-fill fs-4"></i>
                        </div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Năm học</h6>
                        <h3 class="fw-extrabold mb-0" id="stat-academic-years">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-xl-2 col-md-4 col-sm-6">
                <div class="card stat-card h-100">
                    <div class="card-body p-4">
                        <div class="stat-icon bg-success-subtle text-success mb-3">
                            <i class="bi bi-clock-fill fs-4"></i>
                        </div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Học kỳ</h6>
                        <h3 class="fw-extrabold mb-0" id="stat-semesters">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card stat-card h-100">
                    <div class="card-body p-4">
                        <div class="stat-icon bg-info-subtle text-info mb-3">
                            <i class="bi bi-journal-check fs-4"></i>
                        </div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Lớp học phần</h6>
                        <h3 class="fw-extrabold mb-0" id="stat-course-sections">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card stat-card h-100">
                    <div class="card-body p-4">
                        <div class="stat-icon bg-warning-subtle text-warning mb-3">
                            <i class="bi bi-person-badge-fill fs-4"></i>
                        </div>
                        <h6 class="text-muted small fw-bold text-uppercase mb-1">Giảng viên / Phân công</h6>
                        <h3 class="fw-extrabold mb-0" id="stat-assignments">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts/Tables Row -->
        <div class="row animate__animated animate__fadeInUp animate__delay-1s">
            <div class="col-lg-12">
                <div class="card border-0">
                    <div class="card-header border-0 d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="fw-bold mb-0">Thống kê Sĩ số & Trạng thái Lớp học</h5>
                            <p class="text-muted small mb-0">Dữ liệu thời gian thực từ hệ thống</p>
                        </div>
                        <button class="btn btn-light rounded-3 px-3 shadow-sm" onclick="loadDashboardData()">
                            <i class="bi bi-arrow-clockwise me-1"></i> Làm mới
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table premium-table align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-4">Thông tin lớp</th>
                                        <th>Tiến độ đăng ký</th>
                                        <th>Sĩ số thực tế</th>
                                        <th>Chỉ tiêu</th>
                                        <th>Khả dụng</th>
                                        <th class="pe-4">Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="statistics-tbody">
                                    <tr>
                                        <td colspan="6" class="text-center py-5">
                                            <div class="spinner-border text-primary" role="status"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        async function loadDashboardData() {
            try {
                const overview = await apiRequest('/api/dashboard/overview');
                document.getElementById('stat-intakes').textContent = overview.tongNienKhoa || 0;
                document.getElementById('stat-academic-years').textContent = overview.tongNamHoc || 0;
                document.getElementById('stat-semesters').textContent = overview.tongHocKy || 0;
                document.getElementById('stat-course-sections').textContent = overview.tongLopHocPhan || 0;
                document.getElementById('stat-assignments').textContent = overview.tongPhanCongGiangDay || 0;

                const stats = await apiRequest('/api/dashboard/course-sections-statistics');
                const tbody = document.getElementById('statistics-tbody');
                
                if (!stats || stats.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">Không có dữ liệu thống kê</td></tr>';
                    return;
                }

                tbody.innerHTML = stats.map(item => {
                    const percent = Math.min(100, Math.round((item.soSVDangKy / item.chiTieu) * 100)) || 0;
                    const progressColor = percent >= 100 ? 'bg-danger' : (percent > 80 ? 'bg-warning' : 'bg-success');
                    
                    return `
                        <tr>
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <div class="bg-indigo-subtle text-indigo rounded-3 p-2 me-3">
                                        <i class="bi bi-journal-text fs-5"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold text-dark">${item.maLop || ''}</div>
                                        <div class="small text-muted">${item.tenMon || ''}</div>
                                    </div>
                                </div>
                            </td>
                            <td style="min-width: 200px;">
                                <div class="d-flex align-items-center">
                                    <div class="progress flex-grow-1 progress-slim">
                                        <div class="progress-bar ${progressColor}" role="progressbar" style="width: ${percent}%"></div>
                                    </div>
                                    <span class="ms-3 small fw-bold">${percent}%</span>
                                </div>
                            </td>
                            <td><span class="fw-bold">${item.soSVDangKy || 0}</span></td>
                            <td>${item.chiTieu || 0}</td>
                            <td><span class="${item.conTrong > 0 ? 'text-success' : 'text-danger'} fw-bold">${item.conTrong || 0}</span></td>
                            <td class="pe-4">
                                <span class="status-badge ${item.conTrong > 0 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'}">
                                    ${item.conTrong > 0 ? '<i class="bi bi-check-circle me-1"></i>CÒN CHỖ' : '<i class="bi bi-x-circle me-1"></i>ĐÃ ĐẦY'}
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                toast.fire({ icon: 'error', title: 'Lỗi khi đồng bộ dữ liệu tổng quan' });
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
